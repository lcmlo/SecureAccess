{% extends "base.html" %}
{% block content %}
<section class="card">
    <h1>Registo</h1>
    <form method="post">
        <label>
            Username
            <input type="text" name="username" required>
        </label>
        <label>
            Password
            <input type="password" name="password" required>
        </label>
        <button type="submit">Criar conta</button>
    </form>
    <p class="hint">Já tens conta? <a href="{{ url_for('login') }}">Faz login</a>.</p>
</section>
{% endblock %}
